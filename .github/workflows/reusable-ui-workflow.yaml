on:
  workflow_call:
    inputs:
      is_pr:
        type: boolean
        default: false

jobs:
  test-android:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/.github/DangerFiles/Gemfile
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.is_pr }}
        with:
          # We need a sufficient depth or Danger will occasionally run into issues checking which files were modified.
          fetch-depth: 100
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@v4
        if: ${{ ! inputs.is_pr }}
        with:
          ref: ${{ github.head_ref }}
      - name: Install Dependencies
        env:
          MSDK_ANDROID_REMOTE_ACCESS_CALLBACK_URL: ${{ secrets.MSDK_ANDROID_REMOTE_ACCESS_CALLBACK_URL }}
          MSDK_ANDROID_REMOTE_ACCESS_CONSUMER_KEY: ${{ secrets.MSDK_ANDROID_REMOTE_ACCESS_CONSUMER_KEY }}
          UI_TEST_CONFIG: ${{ secrets.UI_TEST_CONFIG }}
        run: |
          ./install.sh
          echo $UI_TEST_CONFIG > ./shared/test/ui_test_config.json
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          # This is the actual Gradle version (not AGP), which can be found in the gradle-wrapper.properties file.
          gradle-version: "8.14.3"
          add-job-summary: on-failure
          add-job-summary-as-pr-comment: on-failure
      - name: Build for Testing
        if: success() || failure()
        run: |
          ./gradlew native:NativeSampleApps:AuthFlowTester:assembleDebug
      - name: Build Single User Tests
        run: |
          ./gradlew native:NativeSampleApps:AuthFlowTester:assembleAndroidTest
      - uses: 'google-github-actions/auth@v2'
        if: success() || failure()
        with:
          credentials_json: '${{ secrets.GCLOUD_SERVICE_KEY }}'
      - uses: 'google-github-actions/setup-gcloud@v2'
        if: success() || failure()
      - name: Run PR Tests
        continue-on-error: true
        if: ${{ inputs.is_pr }}
        env:
          # Most used according to https://gs.statcounter.com/android-version-market-share/mobile-tablet/worldwide
          PR_API_VERSION: "35"
        run: |
          GCLOUD_RESULTS_DIR=authflowtester-pr-build-${{github.run_number}}
          
          PR_TESTS="class com.salesforce.samples.authflowtester.BootConfigLoginTests#testCAOpaque_DefaultScopes_WebServerFlow, \
            class com.salesforce.samples.authflowtester.ECALoginTests#testECAOpaque_DefaultScopes, \
            class com.salesforce.samples.authflowtester.ECALoginTests#testECAJwt_AllScopes, \
            class com.salesforce.samples.authflowtester.TokenMigrationTest#testMigrate_ECA_AddMoreScopes, \
            class com.salesforce.samples.authflowtester.MultiUserLoginTests#testSameApp_SameScopes_uniqueTokens"
          
          gcloud firebase test android run \
            --project mobile-apps-firebase-test \
            --type instrumentation \
            --use-orchestrator \
            --environment-variables clearPackageData=true \
            --app "native/NativeSampleApps/AuthFlowTester/build/outputs/apk/debug/AuthFlowTester-debug.apk" \
            --test "native/NativeSampleApps/AuthFlowTester/build/outputs/apk/androidTest/debug/AuthFlowTester-debug-androidTest.apk" \
            --device model=MediumPhone.arm,version="${PR_API_VERSION}",locale=en,orientation=portrait \
            --directories-to-pull=/sdcard \
            --results-dir="${GCLOUD_RESULTS_DIR}" \
            --results-history-name=AuthFlowTester \
            --no-performance-metrics \
            --test-targets="${PR_TESTS}" \
            --timeout=10m \ 
            --num-flaky-test-attempts=1
      - name: Run All Single User Tests
        continue-on-error: true
        if: ${{ ! inputs.is_pr }}
        env:
          FULL_API_RANGE: "28 29 30 31 32 33 34 35 36"
        run: |
          CREDENTIALS_FILE="shared/test/ui_test_config.json"
          BATCH_SIZE=$(jq '.loginHosts[0].users | length' "$CREDENTIALS_FILE")
        
          IFS=' ' read -r -a ALL_LEVELS <<< "$FULL_API_RANGE"
          TOTAL_LEVELS=${#ALL_LEVELS[@]}
          OFFSET=0
          BATCH_NUM=1
        
          if [ -z "$BATCH_SIZE" ] || [ "$BATCH_SIZE" -le 0 ] 2>/dev/null; then
            echo "Error: BATCH_SIZE is 0 or invalid. Check $CREDENTIALS_FILE"
            exit 1
          fi
        
          while [ $OFFSET -lt "$TOTAL_LEVELS" ]; do
            BATCH_LEVELS=("${ALL_LEVELS[@]:$OFFSET:$BATCH_SIZE}")
            
            DEVICE_ARGS=()
            for LEVEL in "${BATCH_LEVELS[@]}"; do
              DEVICE_ARGS+=(--device "model=MediumPhone.arm,version=${LEVEL},locale=en,orientation=portrait")
            done
            
            GCLOUD_RESULTS_DIR=authflowtester-single-user-build-${{github.run_number}}-batch-${BATCH_NUM}
            echo "Running Batch $BATCH_NUM with levels: ${BATCH_LEVELS[*]}"
  
            gcloud firebase test android run \
              --project mobile-apps-firebase-test \
              --type instrumentation \
              --use-orchestrator \
              --environment-variables clearPackageData=true \
              --app "native/NativeSampleApps/AuthFlowTester/build/outputs/apk/debug/AuthFlowTester-debug.apk" \
              --test "native/NativeSampleApps/AuthFlowTester/build/outputs/apk/androidTest/debug/AuthFlowTester-debug-androidTest.apk" \
              --test-targets "notClass com.salesforce.samples.authflowtester.MultiUserLoginTests" \
              "${DEVICE_ARGS[@]}" \
              --directories-to-pull=/sdcard \
              --results-dir="${GCLOUD_RESULTS_DIR}" \
              --results-history-name=AuthFlowTester \
              --no-performance-metrics \
              --timeout=30m  || true

            OFFSET=$(( OFFSET + BATCH_SIZE ))
            BATCH_NUM=$(( BATCH_NUM + 1 ))
          done
      - name: Run All Multi User Tests
        continue-on-error: true
        if: ${{ ! inputs.is_pr }}
        env:
          FULL_API_RANGE: "28 29 30 31 32 33 34 35 36"
        run: |
          CREDENTIALS_FILE="shared/test/ui_test_config.json"
          NUM_USERS=$(jq '.loginHosts[0].users | length' "$CREDENTIALS_FILE")
          MULTI_BATCH_SIZE=$(( NUM_USERS / 2 ))
          
          if [ -z "$MULTI_BATCH_SIZE" ] || [ "$MULTI_BATCH_SIZE" -le 0 ] 2>/dev/null; then
            echo "Error: MULTI_BATCH_SIZE is 0 or invalid. Check $CREDENTIALS_FILE"
            exit 1
          fi
          
          IFS=' ' read -r -a ALL_LEVELS <<< "$FULL_API_RANGE"
          TOTAL_LEVELS=${#ALL_LEVELS[@]}
          
          # Split into even-indexed and odd-indexed sublists so that
          # no two API levels within a sublist are 1 apart.
          EVEN_INDEXED=()
          ODD_INDEXED=()
          for (( i=0; i<TOTAL_LEVELS; i++ )); do
            if (( i % 2 == 0 )); then
              EVEN_INDEXED+=("${ALL_LEVELS[$i]}")
            else
              ODD_INDEXED+=("${ALL_LEVELS[$i]}")
            fi
          done
          
          BATCH_NUM=1
          
          run_multi_batches() {
            local SUBLIST_LEVELS=("$@")
            local OFFSET=0
            while [ $OFFSET -lt ${#SUBLIST_LEVELS[@]} ]; do
              BATCH_LEVELS=("${SUBLIST_LEVELS[@]:$OFFSET:$MULTI_BATCH_SIZE}")
              
              DEVICE_ARGS=()
              for LEVEL in "${BATCH_LEVELS[@]}"; do
                DEVICE_ARGS+=(--device "model=MediumPhone.arm,version=${LEVEL},locale=en,orientation=portrait")
              done
              
              GCLOUD_RESULTS_DIR=authflowtester-multi-user-${{github.run_number}}-batch-${BATCH_NUM}
              echo "Running Multi User Batch $BATCH_NUM with levels: ${BATCH_LEVELS[*]}"
              
              gcloud firebase test android run \
              --project mobile-apps-firebase-test \
              --type instrumentation \
              --use-orchestrator \
              --environment-variables clearPackageData=true \
              --app "native/NativeSampleApps/AuthFlowTester/build/outputs/apk/debug/AuthFlowTester-debug.apk" \
              --test "native/NativeSampleApps/AuthFlowTester/build/outputs/apk/androidTest/debug/AuthFlowTester-debug-androidTest.apk" \
              --test-targets "class com.salesforce.samples.authflowtester.MultiUserLoginTests" \
              "${DEVICE_ARGS[@]}" \
              --directories-to-pull=/sdcard \
              --results-dir="${GCLOUD_RESULTS_DIR}" \
              --results-history-name=AuthFlowTester \
              --no-performance-metrics \
              --timeout=10m || true
              
              OFFSET=$(( OFFSET + MULTI_BATCH_SIZE ))
              BATCH_NUM=$(( BATCH_NUM + 1 ))
            done
          }

          run_multi_batches "${EVEN_INDEXED[@]}"
          run_multi_batches "${ODD_INDEXED[@]}"
      - name: Copy Test Results
        continue-on-error: true
        if: success() || failure()
        env:
          IS_PR: ${{ inputs.is_pr }}
        run: |
          mkdir -p firebase_results
          BUCKET="gs://test-lab-w87i9sz6q175u-kwp8ium6js0zw"

          copy_results() {
            local RESULTS_DIR=$1
            local OUTPUT_NAME=$2
            local BUCKET_PATH="${BUCKET}/${RESULTS_DIR}"

            if ! gsutil ls "${BUCKET_PATH}" > /dev/null 2>&1; then
              return
            fi

            if gsutil ls "${BUCKET_PATH}/*test_results_merged.xml" > /dev/null 2>&1; then
              gsutil cp "${BUCKET_PATH}/*test_results_merged.xml" "firebase_results/${OUTPUT_NAME}.xml"
            else
              gsutil cp "${BUCKET_PATH}/*/test_result_1.xml" "firebase_results/${OUTPUT_NAME}.xml"
            fi
          }

          if $IS_PR ; then
            copy_results \
              "authflowtester-pr-build-${{github.run_number}}" \
              "pr_test_result"
          else
            for PREFIX in "single-user" "multi-user"; do
              BATCH_NUM=1
              while true; do
                RESULTS_DIR="authflowtester-${PREFIX}-build-${{github.run_number}}-batch-${BATCH_NUM}"

                if ! gsutil ls "${BUCKET}/${RESULTS_DIR}" > /dev/null 2>&1; then
                  break
                fi

                copy_results "${RESULTS_DIR}" "${PREFIX}_batch_${BATCH_NUM}_test_result"
                BATCH_NUM=$(( BATCH_NUM + 1 ))
              done
            done
          fi
      - name: Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: ${{ inputs.lib }} Test Results
          job_name: ${{ inputs.lib }} Test Results
          require_tests: true
          check_retries: true
          flaky_summary: true
          fail_on_failure: true
          group_reports: false
          include_passed: true
          include_empty_in_summary: false
          simplified_summary: true
          report_paths: 'firebase_results/**.xml'